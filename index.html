<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Предложения">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="./manifest.json">
<title>Английские предложения</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#0f172a; --card:#1e293b; --card2:#273548; --ink:#f1f5f9;
  --muted:#94a3b8; --accent:#6366f1; --accent2:#10b981;
  --danger:#ef4444; --border:#334155;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom))}

/* Header */
.hdr{width:100%;max-width:560px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:1.1rem;font-weight:800;color:var(--ink)}
.hdr h1 span{color:var(--accent)}
.score-pill{background:var(--card);border:1px solid var(--border);border-radius:100px;
  padding:6px 14px;font-size:0.75rem;font-weight:700;color:var(--accent2)}

/* Task card */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:24px;
  width:100%;max-width:560px;padding:24px 20px;margin-bottom:16px}
.task-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.badge{padding:4px 12px;border-radius:100px;font-size:0.72rem;font-weight:700;letter-spacing:0.5px}
.badge-time{background:#1d3a5f;color:#60a5fa}
.badge-person{background:#1a3a2a;color:#34d399}
.badge-form{background:#3b1f5e;color:#c084fc}

.verb-display{text-align:center;margin-bottom:20px}
.verb-en{font-size:2.8rem;font-weight:800;color:var(--ink);line-height:1}
.verb-trans{font-size:0.95rem;font-weight:500;color:var(--accent);margin-top:4px}
.verb-hint{font-size:0.78rem;color:var(--muted);margin-top:6px;font-style:italic}

/* Task description */
.task-desc{background:var(--card2);border-radius:14px;padding:14px 16px;margin-bottom:20px;
  font-size:0.9rem;line-height:1.6;color:var(--muted)}
.task-desc strong{color:var(--ink)}

/* Input */
.input-wrap{position:relative;margin-bottom:12px}
.answer-input{width:100%;background:var(--card2);border:2px solid var(--border);
  color:var(--ink);font-family:'Inter',sans-serif;font-size:1rem;font-weight:500;
  padding:14px 16px;border-radius:14px;outline:none;transition:border-color 0.2s;
  -webkit-appearance:none}
.answer-input:focus{border-color:var(--accent)}
.answer-input.ok{border-color:var(--accent2);background:#0d2b1f}
.answer-input.err{border-color:var(--danger);background:#2a0e0e}
.answer-input::placeholder{color:var(--border)}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-bottom:16px}
.btn{flex:1;border:none;border-radius:14px;padding:14px;font-family:'Inter',sans-serif;
  font-size:0.85rem;font-weight:700;cursor:pointer;-webkit-appearance:none;
  touch-action:manipulation;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn-check{background:var(--accent);color:#fff}
.btn-skip{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* Feedback */
.feedback{border-radius:14px;padding:14px 16px;margin-bottom:16px;
  font-size:0.9rem;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.ok{background:#0d2b1f;border:1px solid var(--accent2);color:var(--accent2)}
.feedback.err{background:#2a0e0e;border:1px solid var(--danger);color:#fca5a5}
.feedback strong{font-size:1rem}
.correct-ans{margin-top:8px;color:var(--ink);font-size:0.95rem;font-weight:600;
  background:var(--card);padding:10px 14px;border-radius:10px;letter-spacing:0.3px}

/* Speech section */
.speech-section{background:var(--card2);border:1px solid var(--border);border-radius:16px;
  padding:16px;display:none;margin-bottom:16px}
.speech-section.show{display:block}
.speech-title{font-size:0.75rem;font-weight:700;color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:12px}
.speech-btns{display:flex;gap:10px;margin-bottom:12px}
.btn-mic{flex:1;background:var(--danger);color:#fff;border:none;border-radius:14px;
  padding:14px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;
  cursor:pointer;-webkit-appearance:none;touch-action:manipulation;transition:all 0.2s}
.btn-mic.recording{background:#7f1d1d;animation:pulse 1s infinite}
.btn-listen{flex:1;background:var(--card);color:var(--muted);border:1px solid var(--border);
  border-radius:14px;padding:14px;font-family:'Inter',sans-serif;font-size:0.85rem;
  font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.speech-result{font-size:0.85rem;color:var(--muted);min-height:20px;margin-bottom:10px;
  font-style:italic}
.speech-score{font-size:1rem;font-weight:700;display:none}
.speech-score.show{display:block}
.speech-score.great{color:var(--accent2)}
.speech-score.ok-score{color:#fbbf24}
.speech-score.bad{color:var(--danger)}

/* Next btn fixed */
.next-btn{position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:#fff;
  border:none;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:700;
  padding:18px;padding-bottom:calc(18px + env(safe-area-inset-bottom,0px));
  cursor:pointer;-webkit-appearance:none;touch-action:manipulation;
  display:none;z-index:100;letter-spacing:0.3px}
.next-btn.show{display:block}
.spacer{height:0;transition:height 0.2s}
.spacer.show{height:80px}

/* Result screen */
.result{text-align:center;width:100%;max-width:560px;padding:20px 0;display:none}
.result.show{display:flex;flex-direction:column;align-items:center}
.result-emoji{font-size:4rem;margin-bottom:12px}
.result h2{font-size:1.6rem;font-weight:800;color:var(--ink);margin-bottom:8px}
.result-score{font-size:3.5rem;font-weight:800;color:var(--accent);line-height:1;margin:8px 0}
.result p{color:var(--muted);margin-bottom:24px}
.rbtn{background:var(--accent);color:#fff;border:none;font-family:'Inter',sans-serif;
  font-size:0.9rem;font-weight:700;padding:16px 32px;border-radius:14px;
  cursor:pointer;margin:6px;-webkit-appearance:none;width:100%;max-width:280px}
.rbtn.out{background:transparent;color:var(--accent);border:2px solid var(--accent)}

/* Progress */
.progress{width:100%;max-width:560px;margin-bottom:20px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}
.progress-text{display:flex;justify-content:space-between;font-size:0.72rem;
  color:var(--muted);margin-top:6px}

/* Filter */
.filters{width:100%;max-width:560px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap}
.flt{background:var(--card);border:1px solid var(--border);color:var(--muted);
  font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:600;padding:6px 14px;
  border-radius:100px;cursor:pointer;-webkit-appearance:none}
.flt.active{border-color:var(--accent);color:var(--accent);background:#1e1b4b}

@media(max-width:400px){
  .verb-en{font-size:2.2rem}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>350 <span>глаголов</span></h1>
  <div class="score-pill" id="scorePill">0 / 0</div>
</div>

<div class="filters" id="filters"></div>

<div class="progress">
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  <div class="progress-text">
    <span id="pText">Вопрос 1 из 15</span>
    <span id="pAcc">Точность: 0%</span>
  </div>
</div>

<div class="task-card" id="taskCard">
  <div class="task-meta" id="taskMeta"></div>
  <div class="verb-display">
    <div class="verb-en" id="verbEn"></div>
    <div class="verb-trans" id="verbTrans"></div>
    <div class="verb-hint" id="verbHint"></div>
  </div>
  <div class="task-desc" id="taskDesc"></div>
  <div class="input-wrap">
    <input class="answer-input" id="answerInput" type="text"
      placeholder="Напишите предложение..."
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="btn-row">
    <button class="btn btn-check" id="checkBtn">Проверить ✓</button>
    <button class="btn btn-skip" id="skipBtn">Пропустить</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="speech-section" id="speechSection">
    <div class="speech-title">🎤 Произнесите предложение</div>
    <div class="speech-btns">
      <button class="btn-mic" id="micBtn">🎤 Записать</button>
      <button class="btn-listen" id="listenBtn">🔊 Эталон</button>
    </div>
    <div class="speech-result" id="speechResult">Нажмите 🎤 и произнесите предложение</div>
    <div class="speech-score" id="speechScore"></div>
  </div>
</div>

<div class="spacer" id="spacer"></div>
<button class="next-btn" id="nextBtn">Дальше →</button>

<div class="result" id="result">
  <div class="result-emoji" id="rEmoji">🎉</div>
  <h2>Раунд завершён!</h2>
  <div class="result-score" id="rScore"></div>
  <p id="rMsg"></p>
  <button class="rbtn" onclick="restart()">Ещё раз</button>
  <button class="rbtn out" onclick="restartRandom()">Другие слова</button>
</div>

function getPastForm(verb) {
  var v = verb.toLowerCase().split(' ')[0];
  if (IRREGULAR[v]) return IRREGULAR[v];
  // Regular: add -ed with spelling rules
  if (v.endsWith('e')) return v + 'd';
  if (v.match(/[^aeiou]y$/)) return v.slice(0,-1) + 'ied';
  if (v.match(/[^aeiou][aeiou][^aeioulwx]$/) && v.length <= 7) return v + v.slice(-1) + 'ed';
  return v + 'ed';
}

function addS(verb) {
  var v = verb.toLowerCase().split(' ')[0];
  if (v.endsWith('s')||v.endsWith('sh')||v.endsWith('ch')||v.endsWith('x')||v.endsWith('o')) return v+'es';
  if (v.match(/[^aeiou]y$/)) return v.slice(0,-1)+'ies';
  return v+'s';
}

function buildSentence(task, verb, person) {
  var v = verb.e;
  var base = v.split(' ')[0];
  var rest = v.split(' ').slice(1).join(' ');
  var restStr = rest ? ' ' + rest : '';

  if (task.q) {
    // Question: Aux + person + verb?
    if (task.time === 'Настоящее') {
      return task.aux + ' ' + person + ' ' + base + restStr + '?';
    } else if (task.time === 'Прошедшее') {
      return 'Did ' + person + ' ' + base + restStr + '?';
    } else {
      return 'Will ' + person + ' ' + base + restStr + '?';
    }
  } else if (task.neg) {
    if (task.time === 'Настоящее') {
      return person + ' ' + task.aux + ' ' + base + restStr + '.';
    } else if (task.time === 'Прошедшее') {
      return person + ' did not ' + base + restStr + '.';
    } else {
      return person + ' will not ' + base + restStr + '.';
    }
  } else {
    // Affirmative
    if (task.time === 'Настоящее') {
      var verbForm = task.s ? addS(base) + restStr : base + restStr;
      return person + ' ' + verbForm + '.';
    } else if (task.time === 'Прошедшее') {
      return person + ' ' + getPastForm(base) + restStr + '.';
    } else {
      return person + ' will ' + base + restStr + '.';
    }
  }
}

// Build filters
var fDiv = document.getElementById('filters');
FILTERS.forEach(function(f){
  var b = document.createElement('button');
  b.className = 'flt' + (f.key==='all'?' active':'');
  b.textContent = f.label;
  b.addEventListener('click', function(){
    activeFilter = f.key;
    document.querySelectorAll('.flt').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    restart();
  });
  fDiv.appendChild(b);
});

function shuffle(a){return a.slice().sort(function(){return Math.random()-0.5;});}

function getPool(){
  var f = FILTERS.find(function(x){return x.key===activeFilter;});
  return ALL.slice(f.from, f.to);
}

function makeQuestions(){
  var pool = shuffle(getPool()).slice(0, ROUND);
  var qs = [];
  pool.forEach(function(word){
    var task = TASKS[Math.floor(Math.random()*TASKS.length)];
    var persons = task.persons;
    var person = persons[Math.floor(Math.random()*persons.length)];
    var answer = buildSentence(task, word, person);
    qs.push({word:word, task:task, person:person, answer:answer});
  });
  return qs;
}

function restart(){
  questions = makeQuestions();
  qIdx=0; correct=0; totalQ=0; answered=false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('taskCard').style.display='block';
  hideNext();
  renderQ();
}

function restartRandom(){
  activeFilter='all';
  document.querySelectorAll('.flt').forEach(function(b,i){b.classList.toggle('active',i===0);});
  restart();
}

function normalizeAnswer(s){
  return s.toLowerCase()
    .replace(/['']/g,"'")
    .replace(/\s+/g,' ')
    .trim()
    .replace(/[.?!]$/,'');
}

function checkAnswer(){
  if(answered)return;
  var input = document.getElementById('answerInput');
  var val = input.value.trim();
  if(!val)return;

  answered = true;
  totalQ++;
  document.getElementById('checkBtn').disabled=true;
  input.disabled=true;

  var userN = normalizeAnswer(val);
  var corrN = normalizeAnswer(currentAnswer);
  var isOk = userN === corrN;

  if(isOk) correct++;

  var fb = document.getElementById('feedback');
  if(isOk){
    input.classList.add('ok');
    fb.className='feedback ok show';
    fb.innerHTML='✅ Правильно!<div class="correct-ans">'+currentAnswer+'</div>';
  } else {
    input.classList.add('err');
    fb.className='feedback err show';
    fb.innerHTML='❌ Неверно. Правильный ответ:<div class="correct-ans">'+currentAnswer+'</div>';
  }

  // Show speech section
  document.getElementById('speechSection').classList.add('show');
  showNext();
  updStats();
}

function skipQ(){
  if(answered)return;
  answered=true; totalQ++;
  document.getElementById('answerInput').disabled=true;
  document.getElementById('checkBtn').disabled=true;
  var fb=document.getElementById('feedback');
  fb.className='feedback err show';
  fb.innerHTML='⏭ Пропущено. Правильный ответ:<div class="correct-ans">'+currentAnswer+'</div>';
  document.getElementById('speechSection').classList.add('show');
  showNext();
  updStats();
}

function showNext(){
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('spacer').classList.add('show');
}
function hideNext(){
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('spacer').classList.remove('show');
}

function nextQ(){qIdx++;renderQ();}

// ── SPEECH SYNTHESIS ─────────────────────────────────────────────
function speakSentence(){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var text = currentAnswer; // Keep punctuation for correct intonation
  var u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.8; u.volume=1; u.pitch=1;
  window.speechSynthesis.speak(u);
}
// Preload voices as soon as possible
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function(){
    window.speechSynthesis.getVoices(); // cache voices
  };
}
// Unlock audio on first tap (required by iOS)
document.addEventListener('touchend', function warmup(){
  if(window.speechSynthesis){
    var u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    window.speechSynthesis.speak(u);
  }
  document.removeEventListener('touchend', warmup);
}, {once:true, passive:true});

// ── SPEECH RECOGNITION ───────────────────────────────────────────
function initRecognition(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('micBtn').textContent='🚫 Недоступно';
    document.getElementById('micBtn').disabled=true;
    return null;
  }
  var r = new SR();
  r.lang='en-US'; r.continuous=false; r.interimResults=false; r.maxAlternatives=3;
  r.onresult=function(e){
    var final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
    }
    if(final) evaluateSpeech(final);
  };
  r.onerror=function(e){
    var msg = e.error==='not-allowed'?'Нет доступа к микрофону':
              e.error==='no-speech'?'Речь не распознана — попробуйте ещё раз':
              'Ошибка: '+e.error;
    document.getElementById('speechResult').textContent=msg;
    setMicIdle();
  };
  r.onend=function(){ setMicIdle(); };
  return r;
}

function setMicIdle(){
  isRecording=false;
  var btn=document.getElementById('micBtn');
  btn.innerHTML='🎤 Записать';
  btn.classList.remove('recording');
}

function setMicRecording(){
  isRecording=true;
  var btn=document.getElementById('micBtn');
  btn.innerHTML='⏹ Остановить';
  btn.classList.add('recording');
  document.getElementById('speechResult').textContent='🔴 Идёт запись...';
  document.getElementById('speechScore').className='speech-score';
}

function toggleMic(){
  if(!recognition) recognition=initRecognition();
  if(!recognition) return;
  if(isRecording){
    recognition.stop();
    setMicIdle();
  } else {
    setMicRecording();
    try{ recognition.start(); }
    catch(e){
      recognition=initRecognition();
      if(recognition){ setMicRecording(); recognition.start(); }
    }
  }
}

function evaluateSpeech(spoken){
  var spokenN = normalizeAnswer(spoken);
  var targetN = normalizeAnswer(currentAnswer);
  // Word-level similarity
  var spWords = spokenN.split(' ');
  var tgWords = targetN.split(' ');
  var matched = 0;
  tgWords.forEach(function(w){
    if(spWords.indexOf(w)!==-1) matched++;
  });
  var pct = Math.round(matched/tgWords.length*100);

  var sc=document.getElementById('speechScore');
  sc.classList.add('show');
  if(pct>=90){
    sc.className='speech-score show great';
    sc.textContent='🔥 Отлично! '+pct+'% совпадение';
  } else if(pct>=60){
    sc.className='speech-score show ok-score';
    sc.textContent='👍 Неплохо! '+pct+'% совпадение';
  } else {
    sc.className='speech-score show bad';
    sc.textContent='💪 Попробуйте ещё! '+pct+'% совпадение';
  }
  document.getElementById('speechResult').textContent='"'+spoken+'"';
}

// ── EVENT LISTENERS ──────────────────────────────────────────────
document.getElementById('checkBtn').addEventListener('click', checkAnswer);
document.getElementById('skipBtn').addEventListener('click', skipQ);
document.getElementById('nextBtn').addEventListener('click', nextQ);
document.getElementById('micBtn').addEventListener('click', toggleMic);
document.getElementById('listenBtn').addEventListener('click', function(){
  // Stop mic if recording
  if(isRecording && recognition){ recognition.stop(); }

  // Small delay to release mic before speaking
  setTimeout(function(){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var text = currentAnswer; // Keep punctuation for correct intonation
    var u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.8; u.volume=1; u.pitch=1;

    // iOS: try to find en-US voice explicitly
    var voices = window.speechSynthesis.getVoices();
    var enVoice = null;
    for(var i=0;i<voices.length;i++){
      if(voices[i].lang==='en-US'){ enVoice=voices[i]; break; }
    }
    if(!enVoice){
      for(var j=0;j<voices.length;j++){
        if(voices[j].lang.indexOf('en')===0){ enVoice=voices[j]; break; }
      }
    }
    if(enVoice) u.voice = enVoice;
    window.speechSynthesis.speak(u);
  }, isRecording ? 400 : 0);
});
document.getElementById('answerInput').addEventListener('keydown', function(e){
  if(e.key==='Enter') checkAnswer();
});

function showResult(){
  document.getElementById('taskCard').style.display='none';
  hideNext();
  var pct=totalQ>0?Math.round(correct/totalQ*100):0;
  document.getElementById('rScore').textContent=correct+'/'+totalQ;
  document.getElementById('rEmoji').textContent=pct>=80?'🔥':pct>=60?'👍':'💪';
  document.getElementById('rMsg').textContent=
    pct>=80?'Превосходный результат!':
    pct>=60?'Хороший результат, продолжайте!':
    'Не сдавайтесь — повторите ещё раз!';
  document.getElementById('result').classList.add('show');
}

restart();
</script>
